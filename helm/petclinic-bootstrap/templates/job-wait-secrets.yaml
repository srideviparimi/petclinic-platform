apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-secrets
  namespace: petclinic-{{ .Values.environment }}
  labels:
    app.kubernetes.io/name: wait-for-secrets
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: infrastructure
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": hook-succeeded
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.waitJob.timeoutSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-secrets
        app.kubernetes.io/part-of: petclinic
    spec:
      serviceAccountName: bootstrap-wait
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wait
          image: "{{ .Values.waitJob.image }}:{{ .Values.waitJob.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -c
            - |
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API=https://kubernetes.default.svc
              NS="petclinic-{{ .Values.environment }}"
              TIMEOUT={{ .Values.waitJob.timeoutSeconds }}
              ELAPSED=0

              echo "Bootstrap: waiting for ESO to sync secrets into ${NS}..."

              wait_for_secret() {
                local name="$1"
                echo "  Waiting for secret/${name}..."
                until curl -sf --cacert "$CA" \
                  -H "Authorization: Bearer $TOKEN" \
                  "${API}/api/v1/namespaces/${NS}/secrets/${name}" > /dev/null; do
                  if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                    echo "ERROR: timed out after ${TIMEOUT}s waiting for ${name}"
                    exit 1
                  fi
                  sleep 5
                  ELAPSED=$((ELAPSED + 5))
                done
                echo "  secret/${name} is ready."
              }

              {{- if .Values.externalSecrets.rdsCredentials.enabled }}
              wait_for_secret rds-credentials
              {{- end }}
              {{- if .Values.externalSecrets.openaiApiKey.enabled }}
              wait_for_secret openai-api-key
              {{- end }}

              echo "Bootstrap complete — all required secrets synced. Safe to install service charts."
