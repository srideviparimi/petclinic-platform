awsRegion: eu-central-1

# Environment label applied to namespaces and used in Secrets Manager key paths
# (petclinic/{environment}/rds-credentials)
environment: dev

eso:
  # ESO service account created by the ESO Helm install in the external-secrets namespace
  serviceAccountName: external-secrets-sa

externalSecrets:
  # rds-credentials is always required — DB services cannot start without it
  rdsCredentials:
    enabled: true

  # openai-api-key is optional — genai-service falls back to OPENAI_API_KEY=demo when absent.
  # Set enabled: true only after storing the key in Secrets Manager:
  #   aws secretsmanager put-secret-value \
  #     --secret-id petclinic/dev/openai-api-key --secret-string "sk-..."
  openaiApiKey:
    enabled: false

waitJob:
  # curlimages/curl — minimal multi-arch image; uses the in-cluster K8s API instead of kubectl
  image: curlimages/curl
  tag: "8.11.0"
  # Seconds before the wait Job gives up (ESO sync can take 30-60 s after CRDs apply)
  timeoutSeconds: 300
