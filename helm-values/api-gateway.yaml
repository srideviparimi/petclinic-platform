image:
  repository: "231351515075.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/api-gateway"
  tag: "305a1f1"

service:
  port: 8080

component: "gateway"
springProfiles: "docker"

# Prod default: 2 replicas for HA public-facing entry point; dev.yaml overrides to 1
replicaCount: 2

configData:
  CONFIG_SERVER_URL: "http://config-server:8888"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"

# API Gateway handles all incoming traffic — higher CPU than backend services
resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - "until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done"
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - "until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1
