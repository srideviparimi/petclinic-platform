image:
  repository: "231351515075.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/genai-service"
  tag: "305a1f1"

service:
  port: 8084

component: "service"
# production profile required (same convention as vets-service)
springProfiles: "docker,production"

# 1 replica in both dev and prod — lower priority, cost saving
replicaCount: 1

configData:
  CONFIG_SERVER_URL: "http://config-server:8888"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"

# OpenAI API key synced from AWS Secrets Manager via External Secrets Operator
# optional: true — service falls back to OPENAI_API_KEY=demo if secret is missing
secretEnv:
  - envVar: OPENAI_API_KEY
    secretName: openai-api-key
    secretKey: OPENAI_API_KEY
    optional: true

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - "until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done"
  - name: wait-for-discovery-server
    image: busybox:1.36
    command:
      - sh
      - -c
      - "until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# No PDB for genai-service — single replica in prod, disruption acceptable for cost saving
podDisruptionBudget:
  enabled: false
