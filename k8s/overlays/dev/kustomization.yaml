apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-dev

resources:
  - ../../base/config-server
  - ../../base/discovery-server
  - ../../base/api-gateway
  - ../../base/customers-service
  - ../../base/visits-service
  - ../../base/vets-service
  - ../../base/genai-service
  - ../../base/admin-server

# Dev settings: 1 replica per service, no HPA, no PDB
# These settings are expressed as helm-values/dev.yaml for ArgoCD deployments
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=petclinic"
