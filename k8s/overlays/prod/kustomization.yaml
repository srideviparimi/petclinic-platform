apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-prod

resources:
  - ../../base/config-server
  - ../../base/discovery-server
  - ../../base/api-gateway
  - ../../base/customers-service
  - ../../base/visits-service
  - ../../base/vets-service
  - ../../base/genai-service
  - ../../base/admin-server
  - hpa-api-gateway.yaml
  - hpa-customers-service.yaml
  - hpa-visits-service.yaml
  - hpa-vets-service.yaml
  - hpa-genai-service.yaml
  - pdb-config-server.yaml
  - pdb-discovery-server.yaml
  - pdb-api-gateway.yaml
  - pdb-customers-service.yaml
  - pdb-visits-service.yaml
  - pdb-vets-service.yaml

# Prod settings: 2 replicas for HA services, HPA and PDB enabled
# genai-service and admin-server remain at 1 replica
# These settings are expressed as helm-values/prod.yaml for ArgoCD deployments
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=petclinic"
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: genai-service
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: admin-server
