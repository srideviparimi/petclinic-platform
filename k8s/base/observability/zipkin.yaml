# Zipkin MUST be deployed to the tracing namespace.
# Application services send traces to http://zipkin.tracing:9411/api/v2/spans.
# Using the monitoring namespace would break tracing — services resolve DNS by namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: tracing
  labels:
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: tracing
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zipkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zipkin
        app.kubernetes.io/part-of: petclinic-observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.2
          ports:
            - name: http
              containerPort: 9411
              protocol: TCP
          env:
            - name: STORAGE_TYPE
              value: mem
            - name: MEM_MAX_SPANS
              value: "500000"
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx512m"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: tracing
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    app.kubernetes.io/name: zipkin
  ports:
    - name: http
      port: 9411
      targetPort: 9411
      protocol: TCP
  type: ClusterIP
