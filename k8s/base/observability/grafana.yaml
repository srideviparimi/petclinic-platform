apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  admin-user: admin
  admin-password: changeme-use-eso-in-prod
---
# Datasources ConfigMap — uid fields are REQUIRED.
# Grafana 10+ auto-generates random UIDs if not set; dashboard JSON targets
# reference "uid": "prometheus" and "uid": "loki" explicitly, so a mismatch
# causes every panel to show "Failed to upgrade legacy queries / No Data".
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST

      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        jsonData:
          maxLines: 1000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provisioning
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Petclinic Dashboards'
        orgId: 1
        folder: 'Petclinic'
        folderUid: 'petclinic'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /dashboards
---
# Dashboard JSON ConfigMap — all three dashboards in one ConfigMap, mounted to /dashboards/.
# Each panel target includes "refId" and "datasource" (Grafana 10+ requires both fields).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
data:
  overview.json: |
    {
      "title": "Petclinic Overview",
      "uid": "petclinic-overview",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Service Status",
          "type": "stat",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 5, "w": 24, "x": 0, "y": 0},
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "colorMode": "background",
            "graphMode": "none",
            "orientation": "horizontal"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": 0}, {"color": "green", "value": 1}]}
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "up{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}",
              "legendFormat": "{{job}}",
              "instant": true
            }
          ]
        },
        {
          "id": 2,
          "title": "Request Rate (RPS) — All Services",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Error Rate (5xx) — All Services",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) by (job) / sum(rate(http_server_requests_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "P95 Latency — All Services",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le))",
              "legendFormat": "{{job}} p95"
            }
          ]
        },
        {
          "id": 5,
          "title": "Active Alerts",
          "type": "alertlist",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "options": {"alertName": "", "dashboardAlerts": false, "maxItems": 10, "sortOrder": 3}
        }
      ]
    }

  service.json: |
    {
      "title": "Petclinic Service Details",
      "uid": "petclinic-service",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(up{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}, job)", "refId": "A"},
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (RPS)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"$service\"}[5m])) by (method, uri)",
              "legendFormat": "{{method}} {{uri}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "fieldConfig": {"defaults": {"unit": "percentunit"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"$service\", status=~\"5..\"}[5m])) / sum(rate(http_server_requests_seconds_count{job=\"$service\"}[5m]))",
              "legendFormat": "error rate"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency Percentiles",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"$service\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "refId": "B",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=\"$service\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 4,
          "title": "Active HTTP Connections",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "http_server_active_requests{job=\"$service\"}",
              "legendFormat": "active requests"
            }
          ]
        }
      ]
    }

  jvm.json: |
    {
      "title": "JVM Metrics",
      "uid": "petclinic-jvm",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "query": {"query": "label_values(jvm_memory_used_bytes, job)", "refId": "A"},
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "JVM Heap Memory",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(jvm_memory_used_bytes{job=\"$service\", area=\"heap\"}) by (id)",
              "legendFormat": "used: {{id}}"
            },
            {
              "refId": "B",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(jvm_memory_max_bytes{job=\"$service\", area=\"heap\"}) by (id)",
              "legendFormat": "max: {{id}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "GC Pause Duration",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "rate(jvm_gc_pause_seconds_sum{job=\"$service\"}[5m])",
              "legendFormat": "{{action}} ({{cause}})"
            }
          ]
        },
        {
          "id": 3,
          "title": "JVM Thread Count",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "jvm_threads_live_threads{job=\"$service\"}",
              "legendFormat": "live"
            },
            {
              "refId": "B",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "jvm_threads_peak_threads{job=\"$service\"}",
              "legendFormat": "peak"
            }
          ]
        },
        {
          "id": 4,
          "title": "JVM Non-Heap Memory",
          "type": "timeseries",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [
            {
              "refId": "A",
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(jvm_memory_used_bytes{job=\"$service\", area=\"nonheap\"}) by (id)",
              "legendFormat": "used: {{id}}"
            }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: petclinic-observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_PATHS_DATA
              value: /var/lib/grafana
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /dashboards
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provisioning
          configMap:
            name: grafana-dashboards-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
