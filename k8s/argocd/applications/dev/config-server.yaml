apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-server-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: petclinic
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/srideviparimi/petclinic-platform.git
    targetRevision: main
    path: helm/petclinic-service
    helm:
      releaseName: config-server
      valueFiles:
        - ../../helm-values/config-server.yaml
        - ../../helm-values/dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
